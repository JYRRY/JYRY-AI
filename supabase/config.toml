project_id = "jyry-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://jyry.framer.website", "http://localhost:3000/**"]
jwt_expiry = 3600
enable_signup = true

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = ""
skip_nonce_check = false

[storage]
enabled = true
file_size_limit = "20MiB"

[storage.buckets.user-docs]
public = false
file_size_limit = "20MiB"
allowed_mime_types = ["application/pdf", "image/jpeg", "image/png", "image/webp"]

[storage.buckets.generated]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf"]

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[functions.process-upload]
verify_jwt = false  # triggered by Storage webhook

[functions.process-inbox]
verify_jwt = false  # triggered by cron
